<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outfit Designer — Staging</title>
<style>
  body { margin: 0; background: #ffffff; }
  .page-heading { text-align: center; padding: 40px 0 20px; font-size: 2rem; font-weight: 400; font-family: Noe, Georgia, "Times New Roman", serif; }
</style>
</head>
<body>

<h1 class="page-heading">Outfit Builder</h1>
<div id="outfit-builder-anchor"></div>

<script>
const IS_LOCAL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

// On localhost: point directly to local PHP server
// On Netlify: use /proxy/ prefix — _redirects forwards to production server-side
const OB_CONFIG = IS_LOCAL
    ? { base_url: 'http://localhost:8080/', host: 'localhost' }
    : { base_url: window.location.origin + '/proxy/', host: 'outfitbuilder.mccalls.co.uk' };

// Shopify wrapper fetch URL
const SHOPIFY_URL = IS_LOCAL
    ? 'http://localhost:8080/index.php/shopify'
    : '/proxy/shopify';

const ASSET_URL = window.location.origin + '/';

(function () {
    const anchor = document.getElementById('outfit-builder-anchor');

    // JS from PRODUCTION (correct API URLs hardcoded there)
    // CSS from NETLIFY (our modified versions)
    const scriptsJS = [
        'https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js',
        'https://code.jquery.com/ui/1.13.2/jquery-ui.min.js',
        'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js',
        'https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js',
        ASSET_URL + 'assets/js/mccalls.js',
        ASSET_URL + 'assets/js/designers-min.js'
    ];

    const scriptsCSS = [
        'https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.5.3/css/bootstrap-grid.min.css',
        'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css',
        'https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css',
        ASSET_URL + 'assets/css/fonts.css',
        ASSET_URL + 'assets/css/designer.css'
    ];

    if (anchor) {
        const loadScript = (src) => new Promise((resolve) => {
            const s = document.createElement('script');
            s.src = src;
            s.async = false;
            s.onload = resolve;
            s.onerror = resolve;
            document.body.appendChild(s);
        });

        const loadCSS = (href) => {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            document.head.appendChild(link);
        };

        const contentF = async () => {
            try {
                scriptsCSS.forEach(loadCSS);

                // Fetch wrapper HTML (local PHP on localhost, proxy on Netlify)
                const response = await fetch(SHOPIFY_URL);
                const html = await response.text();
                anchor.innerHTML = html;

                for (const src of scriptsJS) {
                    await loadScript(src);
                }

            } catch (error) {
                console.error('Outfit builder load error:', error);
            }
        };

        contentF();
    }
})();
</script>

</body>
</html>
